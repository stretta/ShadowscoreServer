<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShadowScore Event List</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f5ef;
      --panel: #ffffff;
      --ink: #191b1f;
      --muted: #646b75;
      --line: #d7d4ca;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --danger: #b42318;
      --field: #fbfaf6;
      --focus: #d99f24;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    header {
      align-items: center;
      background: #20232a;
      color: white;
      display: flex;
      gap: 18px;
      min-height: 56px;
      padding: 10px 18px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
      margin: 0;
      white-space: nowrap;
    }

    main {
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .toolbar {
      align-items: end;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(160px, 220px) repeat(4, minmax(110px, 1fr)) auto auto;
    }

    .server-toolbar {
      grid-template-columns: minmax(180px, 260px) auto minmax(220px, 1fr);
    }

    .clip-toolbar {
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
    }

    .clip-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
    }

    .inline {
      align-items: center;
      display: grid;
      gap: 6px;
      grid-template-columns: minmax(80px, 1fr) minmax(72px, auto);
    }

    .clip-attributes {
      align-items: end;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(120px, 150px) minmax(170px, 210px) minmax(140px, 180px) minmax(110px, auto) minmax(110px, auto) minmax(140px, 1fr) auto;
      padding: 12px;
    }

    .check-label {
      align-items: center;
      align-self: center;
      display: flex;
      gap: 8px;
      padding-bottom: 7px;
    }

    label {
      color: var(--muted);
      display: grid;
      font-size: 12px;
      font-weight: 650;
      gap: 4px;
      letter-spacing: 0;
    }

    select,
    input,
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
      min-height: 34px;
    }

    select,
    input {
      background: var(--field);
      color: var(--ink);
      padding: 6px 8px;
      width: 100%;
    }

    input[type="checkbox"] {
      min-height: 0;
      width: auto;
    }

    textarea {
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      min-height: 108px;
      padding: 8px;
      resize: vertical;
      width: 100%;
    }

    select:focus,
    input:focus,
    textarea:focus,
    button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 1px;
    }

    button {
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
      padding: 6px 10px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }

    button.danger {
      border-color: #e6b3ad;
      color: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .status {
      color: #d8dde7;
      flex: 1;
      font-size: 13px;
      overflow: hidden;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary {
      align-items: center;
      color: var(--muted);
      display: flex;
      gap: 12px;
      min-height: 28px;
    }

    .summary strong {
      color: var(--ink);
    }

    .paste-panel {
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto auto;
    }

    .paste-panel label {
      min-width: 0;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 260px;
      overflow: auto;
    }

    table {
      border-collapse: collapse;
      min-width: 980px;
      width: 100%;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 6px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #e9e6dc;
      color: #3e454f;
      font-size: 12px;
      font-weight: 750;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td.index {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
      width: 48px;
    }

    td.actions {
      width: 58px;
    }

    td.boolean {
      text-align: center;
      width: 64px;
    }

    tbody tr[data-muted="true"] {
      background: #faf2f0;
      color: #6d747d;
    }

    tbody tr:hover {
      background: #f2f7f5;
    }

    td input {
      font-variant-numeric: tabular-nums;
      min-width: 80px;
    }

    td select {
      min-width: 130px;
    }

    td input[name="note_id"] {
      min-width: 96px;
    }

    .empty {
      color: var(--muted);
      padding: 24px;
      text-align: center;
    }

    @media (max-width: 980px) {
      header {
        align-items: flex-start;
        display: grid;
      }

      .status {
        text-align: left;
        white-space: normal;
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .paste-panel {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      main {
        padding: 10px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>ShadowScore Event List</h1>
    <div class="status" id="status">Loading session...</div>
  </header>
  <main>
    <section class="toolbar server-toolbar" aria-label="Event list controls">
      <label>Server
        <select id="server-select"></select>
      </label>
      <button id="discover" type="button">Scan</button>
      <label>Custom server
        <input id="server" value="" placeholder="http://pt5.local:8790">
      </label>
    </section>
    <section class="toolbar clip-toolbar" aria-label="Clip selection">
      <label>Clip
        <select id="clip"></select>
      </label>
      <button id="new-clip" type="button">New</button>
      <button id="rename-clip" type="button">Rename</button>
      <button class="danger" id="delete-clip" type="button">Delete</button>
    </section>
    <section class="clip-wrap clip-attributes" aria-label="Clip attributes">
      <label>Clip Mode
        <select id="clip-playback-type">
          <option value="looped">Loop</option>
          <option value="one-shot">One-shot</option>
        </select>
      </label>
      <label>Duration
        <span class="inline">
          <input id="clip-duration-value" type="number" min="0.001" step="0.001">
          <select id="clip-duration-unit">
            <option value="bars">bars</option>
            <option value="beats">beats</option>
          </select>
        </span>
      </label>
      <label>Time
        <span class="inline">
          <input id="clip-time-numerator" type="number" min="1" max="64" step="1" value="4">
          <input id="clip-time-denominator" type="number" min="1" max="64" step="1" value="4">
        </span>
      </label>
      <label class="check-label">
        <input id="clip-follows-pitch" type="checkbox">
        followsPitch
      </label>
      <label class="check-label">
        <input id="clip-follows-scale" type="checkbox">
        followsScale
      </label>
      <label>Transpose
        <input id="clip-transpose-mode" spellcheck="false" value="scale-degree">
      </label>
      <button class="primary" id="save-clip-attributes" type="button">Save Attributes</button>
    </section>
    <section class="summary" aria-live="polite">
      <span><strong id="note-count">0</strong> notes</span>
      <span id="version"></span>
      <span id="assignment"></span>
    </section>
    <section class="toolbar" aria-label="Clip note controls">
      <label>Start
        <input id="new-start" type="number" min="0" step="0.001" value="0">
      </label>
      <label>Duration
        <input id="new-duration" type="number" min="0.001" step="0.001" value="0.25">
      </label>
      <label>Pitch
        <input id="new-pitch" type="number" min="0" max="127" step="1" value="60">
      </label>
      <label>Velocity
        <input id="new-velocity" type="number" min="0" max="127" step="1" value="96">
      </label>
      <button id="add" type="button">Add</button>
      <button class="primary" id="save" type="button">Save</button>
    </section>
    <section class="paste-panel" aria-label="Ableton note array import">
      <label>Ableton note array
        <textarea id="ableton-notes" spellcheck="false" placeholder='[{"pitch":60,"start_time":0,"duration":0.25,"velocity":100}]'></textarea>
      </label>
      <button id="replace-array" type="button">Replace</button>
      <button id="add-array" type="button">Add</button>
    </section>
    <section class="table-wrap" aria-label="Clip note events">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>note_id</th>
            <th>start_time</th>
            <th>duration</th>
            <th>pitch</th>
            <th>velocity</th>
            <th>probability</th>
            <th>mute</th>
            <th>velocity_deviation</th>
            <th>release_velocity</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="notes"></tbody>
      </table>
      <div class="empty" id="empty">No notes for this clip.</div>
    </section>
  </main>
  <script type="module">
    const fields = ["note_id", "start_time", "duration", "pitch", "velocity", "probability", "velocity_deviation", "release_velocity"];
    const state = {
      score: undefined,
      session: undefined,
      serverUrl: "",
      servers: [],
      eventSource: undefined,
      clipId: "",
      notes: [],
      dirty: false,
      attributesDirty: false,
      saving: false
    };

    const els = {
      status: document.querySelector("#status"),
      serverSelect: document.querySelector("#server-select"),
      discover: document.querySelector("#discover"),
      server: document.querySelector("#server"),
      clip: document.querySelector("#clip"),
      newClip: document.querySelector("#new-clip"),
      renameClip: document.querySelector("#rename-clip"),
      deleteClip: document.querySelector("#delete-clip"),
      clipPlaybackType: document.querySelector("#clip-playback-type"),
      clipDurationValue: document.querySelector("#clip-duration-value"),
      clipDurationUnit: document.querySelector("#clip-duration-unit"),
      clipTimeNumerator: document.querySelector("#clip-time-numerator"),
      clipTimeDenominator: document.querySelector("#clip-time-denominator"),
      clipFollowsPitch: document.querySelector("#clip-follows-pitch"),
      clipFollowsScale: document.querySelector("#clip-follows-scale"),
      clipTransposeMode: document.querySelector("#clip-transpose-mode"),
      saveClipAttributes: document.querySelector("#save-clip-attributes"),
      notes: document.querySelector("#notes"),
      empty: document.querySelector("#empty"),
      count: document.querySelector("#note-count"),
      version: document.querySelector("#version"),
      assignment: document.querySelector("#assignment"),
      add: document.querySelector("#add"),
      save: document.querySelector("#save"),
      abletonNotes: document.querySelector("#ableton-notes"),
      replaceArray: document.querySelector("#replace-array"),
      addArray: document.querySelector("#add-array"),
      newStart: document.querySelector("#new-start"),
      newDuration: document.querySelector("#new-duration"),
      newPitch: document.querySelector("#new-pitch"),
      newVelocity: document.querySelector("#new-velocity")
    };

    els.discover.addEventListener("click", discoverServers);
    els.serverSelect.addEventListener("change", () => {
      els.server.value = els.serverSelect.value;
      void loadServer(els.serverSelect.value);
    });
    els.server.addEventListener("change", () => {
      void loadServer(els.server.value);
    });
    els.clip.addEventListener("change", () => {
      if ((state.dirty || state.attributesDirty) && !window.confirm("Discard unsaved edits for this clip?")) {
        els.clip.value = state.clipId;
        return;
      }
      state.clipId = els.clip.value;
      loadClip();
    });
    els.newClip.addEventListener("click", createClip);
    els.renameClip.addEventListener("click", renameClip);
    els.deleteClip.addEventListener("click", deleteClip);
    [
      els.clipPlaybackType,
      els.clipDurationValue,
      els.clipDurationUnit,
      els.clipTimeNumerator,
      els.clipTimeDenominator,
      els.clipFollowsPitch,
      els.clipFollowsScale,
      els.clipTransposeMode
    ].forEach((input) => input.addEventListener("input", markAttributesDirty));
    els.saveClipAttributes.addEventListener("click", saveClipAttributes);
    els.add.addEventListener("click", addNote);
    els.save.addEventListener("click", saveNotes);
    els.replaceArray.addEventListener("click", () => importAbletonNotes("replace"));
    els.addArray.addEventListener("click", () => importAbletonNotes("add"));

    await boot();

    async function boot() {
      renderServerOptions([]);
      await discoverServers();
    }

    async function discoverServers() {
      setStatus("Scanning for local ShadowScore servers...");
      els.discover.disabled = true;
      try {
        const servers = (await Promise.all(serverCandidates().map(async (url) => {
          try {
            return { url, session: await fetchJson(`${url}/session`, 1200) };
          } catch {
            return undefined;
          }
        }))).filter(Boolean);
        state.servers = servers;
        renderServerOptions();
        if (!servers.length) {
          setStatus("No local ShadowScore servers found.");
          return;
        }
        const preferred = servers.find((server) => server.url === currentServerUrl()) ?? servers[0];
        els.serverSelect.value = preferred.url;
        els.server.value = preferred.url;
        await loadServer(preferred.url, preferred.session);
      } catch (error) {
        setStatus(`Scan failed: ${error.message}`);
      } finally {
        els.discover.disabled = false;
      }
    }

    async function loadServer(url, session) {
      const serverUrl = normalizeServerUrl(url);
      if (!serverUrl) {
        setStatus("Enter a ShadowScore server URL.");
        return;
      }
      if (state.dirty && !window.confirm("Discard unsaved edits and switch servers?")) {
        els.server.value = state.serverUrl;
        els.serverSelect.value = state.serverUrl;
        return;
      }
      closeEvents();
      state.serverUrl = serverUrl;
      els.server.value = serverUrl;
      setStatus(`Loading ${serverUrl}...`);
      try {
        state.session = session ?? await fetchJson(`${serverUrl}/session`);
        state.score = await fetchJson(endpointUrl("score", "/score"));
        state.clipId = Object.keys(state.score.clips ?? {}).sort(naturalCompare)[0] ?? "";
        if (!state.servers.some((server) => server.url === serverUrl)) {
          state.servers = [{ url: serverUrl, session: state.session }, ...state.servers];
        }
        renderServerOptions();
        els.serverSelect.value = serverUrl;
        renderClipPicker();
        loadClip();
        connectEvents(endpointUrl("events", "/events"));
        setStatus(`Connected to ${serverLabel(serverUrl, state.session)}.`);
      } catch (error) {
        setStatus(`Load failed: ${error.message}`);
      }
    }

    function connectEvents(url) {
      const events = new EventSource(url);
      const refresh = (event) => {
        const payload = JSON.parse(event.data);
        if (!payload.score) {
          return;
        }
        state.score = payload.score;
        renderClipPicker();
        if (!state.dirty && !state.attributesDirty && !state.saving) {
          loadClip();
        } else {
          renderSummary();
        }
      };
      events.addEventListener("snapshot", refresh);
      events.addEventListener("context.updated", refresh);
      events.addEventListener("voice.notes.replaced", refresh);
      events.addEventListener("voice.assignment.replaced", refresh);
      events.addEventListener("voice.assignment.cleared", refresh);
      events.addEventListener("voice.assignment.preset.applied", refresh);
      events.addEventListener("clip.added", refresh);
      events.addEventListener("clip.replaced", refresh);
      events.addEventListener("clip.renamed", refresh);
      events.addEventListener("clip.removed", refresh);
      events.addEventListener("admin.reset", refresh);
      events.addEventListener("admin.restore", refresh);
      events.onerror = () => setStatus("Event stream reconnecting...");
      state.eventSource = events;
    }

    function closeEvents() {
      state.eventSource?.close();
      state.eventSource = undefined;
    }

    function renderClipPicker() {
      const clips = Object.keys(state.score?.clips ?? {}).sort(naturalCompare);
      els.clip.replaceChildren(...clips.map((clipId) => {
        const option = document.createElement("option");
        option.value = clipId;
        option.textContent = clipId;
        return option;
      }));
      if (!clips.includes(state.clipId)) {
        state.clipId = clips[0] ?? "";
      }
      els.clip.value = state.clipId;
    }

    function loadClip() {
      const clip = selectedClip();
      state.notes = normalizeNotes(clip?.notes ?? []);
      state.dirty = false;
      state.attributesDirty = false;
      renderClipAttributes();
      render();
    }

    function render() {
      els.notes.replaceChildren(...state.notes.map((note, index) => noteRow(note, index)));
      els.empty.hidden = state.notes.length > 0;
      renderSummary();
      updateButtons();
    }

    function renderClipAttributes() {
      const clip = selectedClip();
      const [unit, value] = durationParts(clip?.duration);
      els.clipPlaybackType.value = clip?.playbackType ?? "looped";
      els.clipDurationUnit.value = unit;
      els.clipDurationValue.value = value === "" ? "" : String(value);
      const timeSignature = timeSignatureParts(clip);
      els.clipTimeNumerator.value = String(timeSignature.numerator);
      els.clipTimeDenominator.value = String(timeSignature.denominator);
      els.clipFollowsPitch.checked = clip?.behavior?.followsPitch !== false;
      els.clipFollowsScale.checked = clip?.behavior?.followsScale !== false;
      els.clipTransposeMode.value = clip?.behavior?.transposeMode ?? "scale-degree";
    }

    function durationParts(duration) {
      if (Number.isFinite(duration?.beats)) {
        return ["beats", duration.beats];
      }
      if (Number.isFinite(duration?.bars)) {
        return ["bars", duration.bars];
      }
      return ["bars", ""];
    }

    function durationDocument(unit, value) {
      const number = Number(value);
      if (!Number.isFinite(number) || number <= 0) {
        return {};
      }
      return { [unit === "beats" ? "beats" : "bars"]: number };
    }

    function durationLabel(duration) {
      const [unit, value] = durationParts(duration);
      return value === "" ? "" : `, ${value} ${unit}`;
    }

    function timeSignatureParts(clip) {
      const signature = clip?.context?.clip?.TimeSignature ?? {};
      return {
        numerator: clampInt(readNumber(signature.numerator, 4), 1, 64),
        denominator: clampInt(readNumber(signature.denominator, 4), 1, 64)
      };
    }

    function clipContextWithTimeSignature(context = {}) {
      return {
        ...context,
        clip: {
          ...(context.clip ?? {}),
          TimeSignature: {
            numerator: clampInt(readNumber(els.clipTimeNumerator.value, 4), 1, 64),
            denominator: clampInt(readNumber(els.clipTimeDenominator.value, 4), 1, 64)
          }
        },
        scale: context.scale ?? {},
        grid: context.grid ?? {},
        seed: context.seed ?? 0
      };
    }

    function selectedClip() {
      return state.clipId ? state.score?.clips?.[state.clipId] : undefined;
    }

    function requireSelectedClipId() {
      if (!state.clipId || !selectedClip()) {
        throw new Error("Select a clip first.");
      }
      return state.clipId;
    }

    function defaultClipDocument() {
      return {
        notes: [],
        context: {
          clip: {
            TimeSignature: {
              numerator: 4,
              denominator: 4
            }
          },
          scale: {},
          grid: {},
          seed: 0
        },
        duration: { bars: 2 },
        playbackType: "looped",
        behavior: {
          followsPitch: true,
          followsScale: true,
          transposeMode: "scale-degree"
        }
      };
    }

    function nextClipId() {
      const existing = new Set(Object.keys(state.score?.clips ?? {}));
      let index = existing.size + 1;
      let candidate = `clip-${index}`;
      while (existing.has(candidate)) {
        index += 1;
        candidate = `clip-${index}`;
      }
      return candidate;
    }

    function normalizeId(value) {
      return String(value ?? "").trim().replace(/\s+/g, "-");
    }

    function renderSummary() {
      const clip = selectedClip();
      els.count.textContent = String(state.notes.length);
      els.version.textContent = state.clipId ? `clip ${state.clipId}, score v${state.score?.version ?? 0}` : "No clip selected";
      els.assignment.textContent = clip ? `${clip.playbackType ?? "looped"}${durationLabel(clip.duration)}` : "";
    }

    function updateButtons() {
      const hasClip = Boolean(selectedClip());
      els.clip.disabled = state.saving;
      els.newClip.disabled = state.saving;
      els.renameClip.disabled = state.saving || !hasClip;
      els.deleteClip.disabled = state.saving || !hasClip;
      els.add.disabled = state.saving || !hasClip;
      els.save.disabled = state.saving || !hasClip || !state.dirty;
      els.replaceArray.disabled = state.saving || !hasClip;
      els.addArray.disabled = state.saving || !hasClip;
      els.clipPlaybackType.disabled = state.saving || !hasClip;
      els.clipDurationValue.disabled = state.saving || !hasClip;
      els.clipDurationUnit.disabled = state.saving || !hasClip;
      els.clipTimeNumerator.disabled = state.saving || !hasClip;
      els.clipTimeDenominator.disabled = state.saving || !hasClip;
      els.clipFollowsPitch.disabled = state.saving || !hasClip;
      els.clipFollowsScale.disabled = state.saving || !hasClip;
      els.clipTransposeMode.disabled = state.saving || !hasClip;
      els.saveClipAttributes.disabled = state.saving || !hasClip || !state.attributesDirty;
    }

    function noteRow(note, index) {
      const row = document.createElement("tr");
      row.dataset.muted = String(Boolean(Number(note.mute)));
      row.append(cell(String(index + 1), "index"));
      for (const field of fields) {
        const input = document.createElement("input");
        input.name = field;
        input.type = "number";
        input.step = stepForField(field);
        input.value = note[field] ?? defaultForField(field, index);
        input.addEventListener("input", () => {
          note[field] = readNumber(input.value, defaultForField(field, index));
          markDirty();
        });
        row.append(inputCell(input));
      }

      const mute = document.createElement("input");
      mute.name = "mute";
      mute.type = "checkbox";
      mute.checked = Boolean(Number(note.mute));
      mute.addEventListener("change", () => {
        note.mute = mute.checked ? 1 : 0;
        row.dataset.muted = String(mute.checked);
        markDirty();
      });
      row.insertBefore(inputCell(mute, "boolean"), row.children[7]);

      const remove = document.createElement("button");
      remove.className = "danger";
      remove.type = "button";
      remove.textContent = "Del";
      remove.addEventListener("click", () => {
        state.notes.splice(index, 1);
        markDirty();
        render();
      });
      row.append(inputCell(remove, "actions"));
      return row;
    }

    function addNote() {
      const nextId = Math.max(0, ...state.notes.map((note) => readNumber(note.note_id, 0))) + 1;
      state.notes.push({
        note_id: nextId,
        start_time: readNumber(els.newStart.value, 0),
        duration: Math.max(0.001, readNumber(els.newDuration.value, 0.25)),
        pitch: clampInt(readNumber(els.newPitch.value, 60), 0, 127),
        velocity: clampInt(readNumber(els.newVelocity.value, 96), 0, 127),
        mute: 0,
        probability: 1,
        velocity_deviation: 0,
        release_velocity: 64
      });
      state.notes.sort((a, b) => readNumber(a.start_time, 0) - readNumber(b.start_time, 0));
      markDirty();
      render();
    }

    function importAbletonNotes(mode) {
      try {
        const imported = parseAbletonNotes(els.abletonNotes.value);
        if (!imported.length) {
          setStatus("No notes found in pasted Ableton array.");
          return;
        }
        const next = mode === "replace" ? imported : [...state.notes, ...renumberImportedNotes(imported)];
        state.notes = normalizeNotes(next).map((note, index) => ({
          ...note,
          note_id: note.note_id || index + 1
        }));
        markDirty();
        render();
        setStatus(`${mode === "replace" ? "Replaced with" : "Added"} ${imported.length} pasted notes. Save to commit.`);
      } catch (error) {
        setStatus(`Import failed: ${error.message}`);
      }
    }

    async function saveNotes() {
      state.saving = true;
      updateButtons();
      try {
        const clipId = requireSelectedClipId();
        const clip = selectedClip();
        const score = await postJson(apiUrl(`/clips/${encodeURIComponent(clipId)}`), {
          ...defaultClipDocument(),
          ...clip,
          context: clipContextWithTimeSignature(clip?.context),
          notes: state.notes.map(cleanNote),
          playbackType: clip?.playbackType ?? "looped",
          behavior: clip?.behavior ?? defaultClipDocument().behavior
        });
        state.score = score;
        state.dirty = false;
        loadClip();
        setStatus(`Saved ${state.notes.length} notes for ${clipId}.`);
      } catch (error) {
        setStatus(`Save failed: ${error.message}`);
      } finally {
        state.saving = false;
        updateButtons();
      }
    }

    async function saveClipAttributes() {
      state.saving = true;
      updateButtons();
      try {
        const clipId = requireSelectedClipId();
        const clip = selectedClip();
        state.score = await postJson(apiUrl(`/clips/${encodeURIComponent(clipId)}`), {
          ...defaultClipDocument(),
          ...clip,
          context: clipContextWithTimeSignature(clip?.context),
          notes: state.notes.map(cleanNote),
          playbackType: els.clipPlaybackType.value,
          duration: durationDocument(els.clipDurationUnit.value, els.clipDurationValue.value),
          behavior: {
            ...(clip?.behavior ?? {}),
            followsPitch: els.clipFollowsPitch.checked,
            followsScale: els.clipFollowsScale.checked,
            transposeMode: els.clipTransposeMode.value.trim() || "scale-degree"
          }
        });
        state.attributesDirty = false;
        loadClip();
        setStatus(`Saved clip attributes for ${clipId}.`);
      } catch (error) {
        setStatus(`Clip save failed: ${error.message}`);
      } finally {
        state.saving = false;
        updateButtons();
      }
    }

    async function createClip() {
      const clipId = normalizeId(window.prompt("New clip id", nextClipId()));
      if (!clipId) {
        return;
      }
      state.saving = true;
      updateButtons();
      try {
        state.score = await postJson(apiUrl(`/clips/${encodeURIComponent(clipId)}`), defaultClipDocument());
        state.clipId = clipId;
        renderClipPicker();
        loadClip();
        setStatus(`Created clip ${clipId}.`);
      } catch (error) {
        setStatus(`Create clip failed: ${error.message}`);
      } finally {
        state.saving = false;
        updateButtons();
      }
    }

    async function renameClip() {
      const current = requireSelectedClipId();
      const next = normalizeId(window.prompt("Rename clip", current));
      if (!next || next === current) {
        return;
      }
      state.saving = true;
      updateButtons();
      try {
        state.score = await postJson(apiUrl(`/clips/${encodeURIComponent(current)}/rename`), { clipId: next });
        state.clipId = next;
        renderClipPicker();
        loadClip();
        setStatus(`Renamed ${current} to ${next}.`);
      } catch (error) {
        setStatus(`Rename failed: ${error.message}`);
      } finally {
        state.saving = false;
        updateButtons();
      }
    }

    async function deleteClip() {
      const clipId = requireSelectedClipId();
      if (!window.confirm(`Delete clip ${clipId}? This will fail if the clip is assigned in structure.`)) {
        return;
      }
      state.saving = true;
      updateButtons();
      try {
        state.score = await fetchJson(apiUrl(`/clips/${encodeURIComponent(clipId)}`), undefined, { method: "DELETE" });
        state.clipId = Object.keys(state.score.clips ?? {}).sort(naturalCompare)[0] ?? "";
        renderClipPicker();
        loadClip();
        setStatus(`Deleted clip ${clipId}.`);
      } catch (error) {
        setStatus(`Delete failed: ${error.message}`);
      } finally {
        state.saving = false;
        updateButtons();
      }
    }

    function markDirty() {
      state.dirty = true;
      setStatus("Unsaved edits.");
      updateButtons();
    }

    function markAttributesDirty() {
      state.attributesDirty = true;
      setStatus("Unsaved clip attributes.");
      updateButtons();
    }

    function normalizeNotes(notes) {
      return notes.map((note, index) => ({
        note_id: note.note_id ?? index + 1,
        start_time: note.start_time ?? note.startTime ?? note.time ?? note.start ?? 0,
        duration: note.duration ?? note.length ?? 0,
        pitch: note.pitch ?? 60,
        velocity: note.velocity ?? 96,
        mute: note.mute ?? 0,
        probability: note.probability ?? 1,
        velocity_deviation: note.velocity_deviation ?? note.velocityDeviation ?? 0,
        release_velocity: note.release_velocity ?? note.releaseVelocity ?? 64
      })).sort((a, b) => readNumber(a.start_time, 0) - readNumber(b.start_time, 0));
    }

    function parseAbletonNotes(text) {
      const trimmed = text.trim();
      if (!trimmed) {
        return [];
      }
      const parsed = parseJsonish(trimmed);
      const notes = Array.isArray(parsed)
        ? parsed
        : Array.isArray(parsed?.notes)
          ? parsed.notes
          : Array.isArray(parsed?.contents?.notes)
            ? parsed.contents.notes
            : undefined;
      if (!Array.isArray(notes)) {
        throw new Error("expected an array or an object with a notes array");
      }
      return notes.map(abletonNoteToShadowScore).filter(Boolean);
    }

    function parseJsonish(text) {
      try {
        return JSON.parse(text);
      } catch {
        const start = text.indexOf("[");
        const end = text.lastIndexOf("]");
        if (start !== -1 && end > start) {
          return JSON.parse(text.slice(start, end + 1));
        }
        throw new Error("paste must contain a JSON note array");
      }
    }

    function abletonNoteToShadowScore(note, index) {
      if (Array.isArray(note)) {
        return {
          note_id: index + 1,
          pitch: note[0],
          start_time: note[1],
          duration: note[2],
          velocity: note[3] ?? 96,
          mute: note[4] ?? 0,
          probability: note[5] ?? 1,
          velocity_deviation: note[6] ?? 0,
          release_velocity: note[7] ?? 64
        };
      }
      if (!note || typeof note !== "object") {
        return undefined;
      }
      return {
        note_id: note.note_id ?? note.id ?? index + 1,
        pitch: note.pitch ?? note.midi_note,
        start_time: note.start_time ?? note.startTime ?? note.time ?? note.start,
        duration: note.duration ?? note.length,
        velocity: note.velocity,
        mute: note.mute,
        probability: note.probability,
        velocity_deviation: note.velocity_deviation ?? note.velocityDeviation,
        release_velocity: note.release_velocity ?? note.releaseVelocity
      };
    }

    function renumberImportedNotes(notes) {
      const nextId = Math.max(0, ...state.notes.map((note) => readNumber(note.note_id, 0)));
      return notes.map((note, index) => ({
        ...note,
        note_id: nextId + index + 1
      }));
    }

    function cleanNote(note) {
      return {
        note_id: clampInt(readNumber(note.note_id, 0), 0, 2147483647),
        pitch: clampInt(readNumber(note.pitch, 60), 0, 127),
        start_time: Math.max(0, readNumber(note.start_time, 0)),
        duration: Math.max(0.001, readNumber(note.duration, 0.001)),
        velocity: clampInt(readNumber(note.velocity, 96), 0, 127),
        mute: Boolean(Number(note.mute)) ? 1 : 0,
        probability: clamp(readNumber(note.probability, 1), 0, 1),
        velocity_deviation: clampInt(readNumber(note.velocity_deviation, 0), 0, 127),
        release_velocity: clampInt(readNumber(note.release_velocity, 64), 0, 127)
      };
    }

    function cell(text, className) {
      const td = document.createElement("td");
      td.className = className;
      td.textContent = text;
      return td;
    }

    function inputCell(child, className = "") {
      const td = document.createElement("td");
      td.className = className;
      td.append(child);
      return td;
    }

    function stepForField(field) {
      return field === "start_time" || field === "duration" || field === "probability" ? "0.001" : "1";
    }

    function defaultForField(field, index) {
      return {
        note_id: index + 1,
        start_time: 0,
        duration: 0.25,
        pitch: 60,
        velocity: 96,
        probability: 1,
        velocity_deviation: 0,
        release_velocity: 64
      }[field] ?? 0;
    }

    async function fetchJson(url, timeoutMs, init = {}) {
      const controller = timeoutMs ? new AbortController() : undefined;
      const timeout = controller ? window.setTimeout(() => controller.abort(), timeoutMs) : undefined;
      try {
        const response = await fetch(url, controller ? { ...init, signal: controller.signal } : init);
        if (!response.ok) {
          throw new Error(await response.text());
        }
        return response.json();
      } finally {
        if (timeout !== undefined) {
          window.clearTimeout(timeout);
        }
      }
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!response.ok) {
        throw new Error(await response.text());
      }
      return response.json();
    }

    function renderServerOptions(servers = state.servers) {
      const current = currentServerUrl();
      const unique = new Map(servers.map((server) => [server.url, server]));
      els.serverSelect.replaceChildren();
      if (!unique.size) {
        const option = document.createElement("option");
        option.value = current;
        option.textContent = current ? "Custom server" : "No servers found";
        els.serverSelect.append(option);
        els.serverSelect.value = current;
        return;
      }
      for (const server of unique.values()) {
        const option = document.createElement("option");
        option.value = server.url;
        option.textContent = serverLabel(server.url, server.session);
        els.serverSelect.append(option);
      }
      if (unique.has(current)) {
        els.serverSelect.value = current;
      }
    }

    function serverCandidates() {
      return [
        els.server.value,
        els.serverSelect.value,
        window.location.origin,
        "http://pt5.local:8790",
        "http://pt4.local:8790",
        "http://shadowbox.local:8790",
        "http://127.0.0.1:8790"
      ].map(normalizeServerUrl).filter(Boolean).filter((url, index, urls) => urls.indexOf(url) === index);
    }

    function serverLabel(url, session) {
      const name = session?.server?.advertisedName || session?.server?.hostIdentity || session?.ensembleId || "ShadowScore";
      const role = session?.server?.role ? ` ${session.server.role}` : "";
      return `${name}${role} (${url})`;
    }

    function currentServerUrl() {
      return normalizeServerUrl(els.server.value) || normalizeServerUrl(els.serverSelect.value) || normalizeServerUrl(state.serverUrl);
    }

    function normalizeServerUrl(value) {
      const trimmed = String(value ?? "").trim().replace(/\/+$/, "");
      if (!trimmed) {
        return "";
      }
      if (!trimmed.startsWith("http://") && !trimmed.startsWith("https://")) {
        return `http://${trimmed}`;
      }
      return trimmed;
    }

    function endpointUrl(name, fallbackPath) {
      const endpoint = state.session?.endpoints?.[name];
      return endpoint || apiUrl(fallbackPath);
    }

    function apiUrl(path) {
      return `${state.serverUrl}${path}`;
    }

    function readNumber(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function clampInt(value, min, max) {
      return Math.round(clamp(value, min, max));
    }

    function naturalCompare(a, b) {
      return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: "base" });
    }

    function setStatus(message) {
      els.status.textContent = message;
    }
  </script>
</body>
</html>
