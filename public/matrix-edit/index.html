<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShadowScore Matrix Edit</title>
  <style>
    :root {
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1f2428;
    }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header {
      align-items: center;
      background: #20272f;
      color: white;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      padding: 16px clamp(16px, 4vw, 40px);
    }
    h1 { font-size: 20px; letter-spacing: 0; margin: 0; }
    main {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(220px, 280px) 1fr;
      margin: 0 auto;
      max-width: 1180px;
      padding: 22px clamp(16px, 4vw, 40px) 38px;
    }
    button, textarea {
      font: inherit;
    }
    button {
      align-items: center;
      background: #fff;
      border: 1px solid #b8c0c7;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      font-weight: 700;
      justify-content: center;
      min-height: 38px;
      padding: 8px 12px;
    }
    button.primary {
      background: #256f86;
      border-color: #256f86;
      color: #fff;
    }
    .status { color: #d2dae2; font-size: 14px; }
    .panel {
      background: #fff;
      border: 1px solid #d6d9dd;
      border-radius: 8px;
      min-width: 0;
      padding: 14px;
    }
    .voices {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .voice {
      align-items: center;
      border: 1px solid #cdd3d8;
      border-radius: 6px;
      cursor: pointer;
      display: grid;
      gap: 8px;
      grid-template-columns: 18px 14px 1fr;
      min-height: 42px;
      padding: 8px;
    }
    .voice input { margin: 0; }
    .swatch {
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 50%;
      height: 14px;
      width: 14px;
    }
    .voice-name { font-weight: 750; min-width: 0; overflow-wrap: anywhere; }
    .muted { color: #67727d; font-size: 13px; }
    .grid {
      background:
        linear-gradient(#e4e8eb 1px, transparent 1px),
        linear-gradient(90deg, #e4e8eb 1px, transparent 1px);
      background-size: 40px 26px;
      border: 1px solid #cbd2d8;
      height: min(48vw, 360px);
      min-height: 260px;
      position: relative;
    }
    .note {
      border: 1px solid rgba(0, 0, 0, 0.25);
      border-radius: 4px;
      min-height: 14px;
      position: absolute;
    }
    .editor {
      display: grid;
      gap: 10px;
      grid-template-rows: auto 1fr auto;
      margin-top: 12px;
    }
    textarea {
      border: 1px solid #bac2ca;
      border-radius: 6px;
      min-height: 220px;
      padding: 10px;
      resize: vertical;
      width: 100%;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; }
      .grid { height: 320px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ShadowScore Matrix Edit</h1>
    <div class="status" id="status">Connecting...</div>
  </header>
  <main>
    <section class="panel">
      <div class="voices" id="voices"></div>
    </section>
    <section class="panel">
      <div class="grid" id="grid"></div>
      <div class="editor">
        <div>
          <strong id="selected-label">No voice selected</strong>
          <div class="muted" id="selected-meta"></div>
        </div>
        <textarea id="notes" spellcheck="false"></textarea>
        <div class="toolbar">
          <button id="reload" type="button">Reload</button>
          <button class="primary" id="save" type="button">Save selected voice</button>
        </div>
      </div>
    </section>
  </main>
  <script>
    const statusEl = document.querySelector("#status");
    const voicesEl = document.querySelector("#voices");
    const gridEl = document.querySelector("#grid");
    const notesEl = document.querySelector("#notes");
    const selectedLabelEl = document.querySelector("#selected-label");
    const selectedMetaEl = document.querySelector("#selected-meta");
    let score;
    let selectedVoiceId;

    document.querySelector("#reload").addEventListener("click", loadScore);
    document.querySelector("#save").addEventListener("click", saveSelectedVoice);

    loadScore();
    const events = new EventSource("/events");
    events.addEventListener("snapshot", (event) => setScore(JSON.parse(event.data).score, { keepEditor: false }));
    events.addEventListener("voice.notes.replaced", (event) => setScore(JSON.parse(event.data).score, { keepEditor: true }));
    events.addEventListener("voice.assignment.replaced", (event) => setScore(JSON.parse(event.data).score, { keepEditor: true }));
    events.addEventListener("voice.assignment.cleared", (event) => setScore(JSON.parse(event.data).score, { keepEditor: true }));
    events.addEventListener("admin.reset", (event) => setScore(JSON.parse(event.data).score, { keepEditor: false }));
    events.onerror = () => setStatus("Reconnecting...");

    async function loadScore() {
      const response = await fetch("/score");
      setScore(await response.json(), { keepEditor: false });
    }

    function setScore(nextScore, options) {
      const previousSelection = selectedVoiceId;
      score = nextScore;
      selectedVoiceId = score.voices[selectedVoiceId] ? selectedVoiceId : Object.keys(score.voices)[0];
      renderVoices();
      renderGrid();
      if (!options.keepEditor || previousSelection !== selectedVoiceId) {
        notesEl.value = JSON.stringify(score.voices[selectedVoiceId].notes, null, 2);
      }
      setStatus(score.ensembleId + " · score v" + score.version);
    }

    function renderVoices() {
      voicesEl.textContent = "";
      for (const voiceId of Object.keys(score.voices)) {
        const assignment = score.assignments?.[voiceId] ?? {};
        const label = document.createElement("label");
        label.className = "voice";
        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "voice";
        radio.checked = voiceId === selectedVoiceId;
        radio.addEventListener("change", () => selectVoice(voiceId));
        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = assignment.color || "#8f979f";
        const text = document.createElement("span");
        text.className = "voice-name";
        text.textContent = assignment.label || voiceId;
        label.append(radio, swatch, text);
        voicesEl.append(label);
      }
      const assignment = score.assignments?.[selectedVoiceId] ?? {};
      selectedLabelEl.textContent = assignment.label || selectedVoiceId;
      selectedMetaEl.textContent = selectedVoiceId + " · voice v" + score.voices[selectedVoiceId].version;
    }

    function selectVoice(voiceId) {
      selectedVoiceId = voiceId;
      notesEl.value = JSON.stringify(score.voices[selectedVoiceId].notes, null, 2);
      renderVoices();
      renderGrid();
    }

    function renderGrid() {
      gridEl.textContent = "";
      for (const [voiceId, voice] of Object.entries(score.voices)) {
        const assignment = score.assignments?.[voiceId] ?? {};
        for (const note of voice.notes) {
          gridEl.append(noteElement(voiceId, note, assignment));
        }
      }
    }

    function noteElement(voiceId, note, assignment) {
      const el = document.createElement("div");
      const start = finite(note.start_time ?? note.start ?? note.tick, 0);
      const duration = Math.max(0.25, finite(note.duration, 1));
      const pitch = finite(note.pitch ?? note.midi, 60);
      el.className = "note";
      el.style.background = assignment.color || "#256f86";
      el.style.opacity = voiceId === selectedVoiceId ? "0.95" : "0.28";
      el.style.left = Math.max(0, start * 40) + "px";
      el.style.width = Math.max(18, duration * 40) + "px";
      el.style.top = Math.max(0, Math.min(330, (84 - pitch) * 6)) + "px";
      return el;
    }

    async function saveSelectedVoice() {
      let notes;
      try {
        notes = JSON.parse(notesEl.value);
      } catch (error) {
        setStatus("Invalid JSON: " + error.message);
        return;
      }
      const response = await fetch("/voices/" + encodeURIComponent(selectedVoiceId) + "/notes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          notes,
          expectedVoiceVersion: score.voices[selectedVoiceId].version
        })
      });
      const body = await response.json();
      if (!response.ok || body.ok === false) {
        setStatus(body.error || "Save failed");
        return;
      }
      setScore(body, { keepEditor: false });
    }

    function finite(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }
  </script>
</body>
</html>
