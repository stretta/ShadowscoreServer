<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShadowScore Matrix Edit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/matrix-edit/assets/index-BFM_7h-8.js"></script>
    <link rel="stylesheet" crossorigin href="/matrix-edit/assets/index-1IK8VDXA.css">
  </head>
  <body>
    <main>
      <div class="toolbar">
        <select id="mode" aria-label="Editor mode">
          <option value="shadowscore" selected>ShadowScore Server</option>
          <option value="rnbo">RNBO Packed Notes</option>
        </select>
        <select id="server-select" aria-label="ShadowScore servers"></select>
        <button id="discover" type="button">Scan</button>
        <input id="server" value="" aria-label="ShadowScore server" placeholder="Custom server" />
        <input id="voice" value="" aria-label="ShadowScore voice" placeholder="Voice" list="voice-picker" />
        <datalist id="voice-picker"></datalist>
        <select id="rnbo-target" aria-label="RNBO client"></select>
        <input id="assignee" value="" aria-label="ShadowScore assignee" placeholder="Assignee" />
        <input id="device-id" value="" aria-label="ShadowScore device" placeholder="Device" />
        <input id="client-id" value="" aria-label="ShadowScore client" placeholder="Client" />
        <input id="assignment-label" value="" aria-label="ShadowScore assignment label" placeholder="Label" />
        <input id="assignment-color" value="" aria-label="ShadowScore assignment color" placeholder="Color" />
        <label class="check-label">
          <input id="assignment-locked" type="checkbox" />
          Locked
        </label>
        <button id="assign" type="button">Assign</button>
        <button id="clear" class="danger-button" type="button">Clear Voice</button>
        <input id="target" value="http://192.168.68.96:5678" aria-label="RNBO target" />
        <input id="bridge" value="http://127.0.0.1:8790" aria-label="RNBO OSC bridge" />
        <button id="refresh" type="button">Refresh</button>
        <button id="sync" type="button">Sync</button>
        <span id="stage-status" class="stage-status"></span>
      </div>
      <div class="toolbar compact">
        <label>
          Root
          <select id="scale-root"></select>
        </label>
        <label>
          Scale
          <select id="scale"></select>
        </label>
        <label>
          Low Note
          <span class="stepper">
            <input id="root-pitch" type="number" min="0" max="127" value="48" />
            <span class="stepper-buttons">
              <button type="button" class="stepper-button" data-step-target="root-pitch" data-step-amount="1" aria-label="Increase low note">+</button>
              <button type="button" class="stepper-button" data-step-target="root-pitch" data-step-amount="-1" aria-label="Decrease low note">-</button>
            </span>
          </span>
        </label>
        <label>
          Rows
          <span class="stepper">
            <input id="pitch-rows" type="number" min="8" max="64" value="24" />
            <span class="stepper-buttons">
              <button type="button" class="stepper-button" data-step-target="pitch-rows" data-step-amount="1" aria-label="Increase rows">+</button>
              <button type="button" class="stepper-button" data-step-target="pitch-rows" data-step-amount="-1" aria-label="Decrease rows">-</button>
            </span>
          </span>
        </label>
        <label>
          Duration
          <span class="stepper">
            <input id="duration" type="number" min="0.000001" max="255" step="any" value="4" />
            <span class="stepper-buttons">
              <button type="button" class="stepper-button" data-step-target="duration" data-step-amount="1" aria-label="Increase duration">+</button>
              <button type="button" class="stepper-button" data-step-target="duration" data-step-amount="-1" aria-label="Decrease duration">-</button>
            </span>
          </span>
        </label>
        <label>
          Velocity
          <span class="stepper">
            <input id="velocity" type="number" min="1" max="127" value="100" />
            <span class="stepper-buttons">
              <button type="button" class="stepper-button" data-step-target="velocity" data-step-amount="1" aria-label="Increase velocity">+</button>
              <button type="button" class="stepper-button" data-step-target="velocity" data-step-amount="-1" aria-label="Decrease velocity">-</button>
            </span>
          </span>
        </label>
      </div>
      <canvas id="matrix" aria-label="RNBO matrix parameter"></canvas>
      <p id="status"></p>
    </main>
  </body>
</html>
